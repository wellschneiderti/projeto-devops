name: Continuous Integration

on:
  push:
    branches: [ "main", "fluxos de trabalho" ]
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:


jobs:

  build:

    runs-on: ubuntu-latest


    steps:
      - uses: actions/checkout@v4


      - name: Rodando um teste de CI
        run: echo Hello, world!


      - name: Run a multi-line script
        run: |
          echo "O código foi integrado e testado com sucesso!"
          

testes:
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Test with pytest
      run:
        pip install pytest pytest-cov
        pytest test/test.py --doctest=modules --junitxml=junit/test-results.xml --cov=com --cov-report=xml --cov-report=html

